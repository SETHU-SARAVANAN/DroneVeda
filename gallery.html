<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery — DroneVeda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:20px; align-items:start; }
    .gallery-item img{ width:100%; display:block; aspect-ratio:4/3; object-fit:cover; border-radius:10px; box-shadow: 0 6px 18px rgba(0,0,0,0.12);} 
    .gallery-instructions { max-width:820px; margin: 18px auto; color:var(--text-muted); }

    /* better touch / mobile sizing */
    @media (max-width:600px){
      .gallery-grid { grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:14px; }
      .gallery-item img{ aspect-ratio:4/3; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo" style="display:flex; align-items:center; gap:10px;">
        <img src="WhatsApp Image 2026-06-14 at 5.45.42 PM.jpeg" alt="DroneVeda Logo" style="height:32px; width:auto; display:inline-block;">
        <span class="logo-text">DRONEVEDA</span>
      </a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="workshops.html" class="nav-link">WORKSHOPS</a>
        <a href="custom-builds.html" class="nav-link">CUSTOM BUILDS</a>
        <a href="about.html" class="nav-link">ABOUT</a>
        <a href="gallery.html" class="nav-link active">GALLERY</a>
      </nav>
    </div>
  </header>

  <main style="padding:100px 16px; max-width:1200px; margin:0 auto;">
    <h1 style="text-align:center; margin-bottom:10px;">Gallery</h1>
    <p class="gallery-instructions">Add images to <strong>public/gallery/</strong> and name them <code>photo1.jpg</code>, <code>photo2.jpg</code>, ... up to <code>photo30.jpg</code>. The page will automatically detect and display any files present with those names. Supported formats: jpg, jpeg, png, webp.</p>

    <div id="galleryGrid" class="gallery-grid"></div>
  </main>

  <script>
    (function(){
      const grid = document.getElementById('galleryGrid');

      // Cloudinary images provided by user
      const cloudUrls = [
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283499/WhatsApp_Image_2026-06-22_at_11.21.25_AM_1_axnxdu.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283499/WhatsApp_Image_2026-06-22_at_11.21.23_AM_dcd30o.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283498/WhatsApp_Image_2026-06-22_at_11.21.24_AM_tcecqs.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283499/WhatsApp_Image_2026-06-22_at_10.42.59_AM_zjbdiw.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283498/WhatsApp_Image_2026-06-22_at_11.32.32_AM_rk9fbm.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283498/khvyhvy_arx7td.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283497/WhatsApp_Image_2026-06-22_at_11.21.25_AM_vmkz38.jpg',
        'https://res.cloudinary.com/dbspky90x/image/upload/v1782283497/WhatsApp_Image_2026-06-22_at_11.32.43_AM_pddmyo.jpg'
      ];

      // Insert cloud images first
      cloudUrls.forEach((u,i)=>{
        const wrap = document.createElement('div'); wrap.className='gallery-item';
        const img = document.createElement('img');
        img.src = u;
        img.alt = `Cloud photo ${i+1}`;
        wrap.appendChild(img);
        grid.appendChild(wrap);
      });

      // Then try local fallback images (photo1..photo30)
      const formats = ['jpg','jpeg','png','webp'];
      const max = 30;

      const tryLoad = (url)=>{
        return new Promise((resolve)=>{
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => resolve(null);
          img.src = url;
        });
      };

      (async ()=>{
        let foundLocal = 0;
        for(let i=1;i<=max;i++){
          for(const ext of formats){
            const path = `public/gallery/photo${i}.${ext}`;
            const img = await tryLoad(path);
            if(img){
              const el = document.createElement('div'); el.className='gallery-item';
              img.alt = `Gallery photo ${i}`; el.appendChild(img);
              grid.appendChild(el);
              foundLocal++;
              break;
            }
          }
        }
        if(cloudUrls.length===0 && foundLocal===0){
          grid.innerHTML = '<p style="color:var(--text-muted);">No gallery images found. Upload files to <strong>public/gallery/</strong> named <code>photo1.jpg</code>, <code>photo2.jpg</code> etc., or provide image URLs.</p>';
        }
      })();
    })();
  </script>
</body>
</html>
